<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Alarm</title>
    <link rel="icon"  href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="clock-container">
        <div class="clock" id="clockBody">
            <div class="hand hour" id="hourHand"></div>
            <div class="hand minute" id="minHand"></div>
            <div class="hand second" id="secHand"></div>
            <div class="center-dot"></div>
        </div>
    </div>

    <div class="container" id="alarmList"></div>

    <div class="popup" id="formPopup">
        <div class="popup-content">
            <h2 style="margin-top:0">New Alarm</h2>
            <div style="display:flex; justify-content: center; gap:10px; margin:10px 0;">
                <input type="number" id="hIn" placeholder="12" oninput="validateTime(this, 12)"
                    style="width:70px; background:#0f172a; border-radius:10px; color:white; border:1px solid var(--accent); font-size:1.5rem; text-align:center;">
                <input type="number" id="mIn" placeholder="00" oninput="validateTime(this, 59)"
                    style="width:70px; background:#0f172a; border-radius:10px; color:white; border:1px solid var(--accent); font-size:1.5rem; text-align:center;">
                <select id="ampmIn"
                    style="width:70px; background:#0f172a; border-radius:10px; color:white; border:1px solid var(--accent); font-size:1rem;">
                    <option>AM</option>
                    <option>PM</option>
                </select>
            </div>
            <button class="save-btn" onclick="saveAlarm()">Save Alarm</button>
            <button onclick="closeForm()"
                style="background:none; border:none; color:#94a3b8; margin-top:15px; cursor:pointer"
                class="cancel">Cancel</button>
        </div>
    </div>

    <div class="popup" id="mathPopup">
        <div class="popup-content">
            <h2 style="margin:0">Solve to Stop</h2>
            <div class="math-q" id="mathQuestion">5 + 5</div>
            <input type="number" id="mathAnswer" class="ans-input" placeholder="Enter Answer">
            <button class="save-btn" onclick="verifyMath()">Dismiss Alarm</button>
        </div>
    </div>
    <div id="fabOptions" class="fab-options" style="display: none;">
        <button onclick="openForm()" class="menu-item">
            <img src="alarm.svg" alt="Alarm" class="menu-icon">
            <span>Set Alarm</span>
        </button>
        <button onclick="openRingtoneMenu()" class="menu-item">
            <img src="ringtone.svg" alt="Ringtone" class="menu-icon">
            <span>Change Ringtone</span>
        </button>
    </div>

    <div class="quick-nap-container" style="text-align: center; margin: 20px 0;">
    <p style="color: #94a3b8; margin-bottom: 10px;">Quick Nap</p>
    <div style="display: flex; justify-content: center; gap: 10px;">
        <button class="nap-btn" onclick="setQuickNap(10)">10m</button>
        <button class="nap-btn" onclick="setQuickNap(15)">15m</button>
        <button class="nap-btn" onclick="setQuickNap(20)">20m</button>
        <button class="nap-btn" onclick="setQuickNap(30)">30m</button>
    </div>
</div>

    <button class="fab" onclick="toggleFabMenu()">+</button>

    <div class="popup" id="ringtonePopup">
        <div class="popup-content" style="max-width: 300px;">
            <h2>Select Ringtone</h2>
            <div id="ringtoneList" style="text-align: left; margin-bottom: 20px;">
                <div class="rt-item" onclick="selectTone('alert-in-hall-alarm.wav', this)">
                    <span>Alert in Hall</span>
                    <img src="play.svg" class="play-icon"
                        onclick="previewSound('alert-in-hall-alarm.wav', event, this)">
                </div>
                <div class="rt-item" onclick="selectTone('classic-alarm.wav', this)">
                    <span>Classic Alarm</span>
                    <img src="play.svg" class="play-icon" onclick="previewSound('classic-alarm.wav', event, this)">
                </div>
                <div class="rt-item" onclick="selectTone('clock-digital-alarm.wav', this)">
                    <span>Digital Clock</span>
                    <img src="play.svg" class="play-icon"
                        onclick="previewSound('clock-digital-alarm.wav', event, this)">
                </div>
                <div class="rt-item" onclick="selectTone('coins-alarm.wav', this)">
                    <span>Coins Sound</span>
                    <img src="play.svg" class="play-icon" onclick="previewSound('coins-alarm.wav', event, this)">
                </div>
                <div class="rt-item" onclick="selectTone('game-emergency-alarm.wav', this)">
                    <span>Game Emergency</span>
                    <img src="play.svg" class="play-icon"
                        onclick="previewSound('game-emergency-alarm.wav', event, this)">
                </div>
                 <div class="rt-item" onclick="selectTone('laughing-cartoon-alarm.wav', this)">
                    <span>Laughing Cartoon</span>
                    <img src="play.svg" class="play-icon"
                        onclick="previewSound('laughing-cartoon-alarm.wav', event, this)">
                </div>
                 <div class="rt-item" onclick="selectTone('jakport-alarm.wav', this)">
                    <span>Jackport Alarm</span>
                    <img src="play.svg" class="play-icon"
                        onclick="previewSound('jackpot-alarm.wav', event, this)">
                </div>
            </div>
            <button class="save-btn" onclick="saveRingtone()">Apply Change</button>
            <button onclick="closeRingtone()" class="cancel">Cancel</button>
        </div>
    </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
